<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scrolling Tiled Map with Animated Player</title>
  <style>
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid black;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script src="data.js"></script>
<script src="tileset.js"></script>
<script>
const TILE_SIZE = 32;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 600;
canvas.height = 400;

const mapCanvas = document.createElement('canvas');
const mapCtx = mapCanvas.getContext('2d');

const tilesetLimits = [];
let tileCount = 0;
for (const ts of tilesets) {
  tileCount += ts.cols * ts.rows;
  tilesetLimits.push(tileCount);
}

const images = [];
let loadedCount = 0;

tilesets.forEach((tileset, i) => {
  const img = new Image();
  img.src = tileset.src;
  img.onload = () => {
    images[i] = img;
    loadedCount++;
    if (loadedCount === tilesets.length && playerImage.complete) {
      drawFullMapToCanvas();
      requestAnimationFrame(gameLoop);
    }
  };
});

const playerImage = new Image();
playerImage.src = 'mc-2.png';

const player = {
  x: 10 * TILE_SIZE,
  y: 10 * TILE_SIZE,
  vx: 0,
  vy: 0,
  speed: 1.5,
  direction: 'down',
  moving: false,
  frameIndex: 0,
  lastFrameTime: 0,
  frameDelay: 150,
  attackFrameDelay: 80,
  state: 'idle',
  isAttackingKey: false,
  frames: {
    down: [52, 53, 54, 55],
    left: [10, 11, 12, 13],
    right: [24, 25, 26, 27],
    up: [38, 39, 40, 41],
    idleDown: [42, 43, 44, 45],
    idleLeft: [0, 1, 2, 3],
    idleRight: [14, 15, 16, 17],
    idleUp: [28, 29, 30, 31],
    attackDown: [46, 47, 48, 49, 50, 51],
    attackLeft: [4, 5, 6, 7, 8, 9],
    attackRight: [18, 19, 20, 21, 22, 23],
    attackUp: [32, 33, 34, 35, 36, 37]
  }
};

playerImage.onload = () => {
  if (loadedCount === tilesets.length) {
    drawFullMapToCanvas();
    requestAnimationFrame(gameLoop);
  }
};

function drawTile(globalIndex, x, y, context = ctx) {
  let tilesetIndex = 0;
  let localIndex = globalIndex;

  for (let i = 0; i < tilesetLimits.length; i++) {
    if (globalIndex < tilesetLimits[i]) {
      tilesetIndex = i;
      localIndex = globalIndex - (tilesetLimits[i - 1] || 0);
      break;
    }
  }

  const ts = tilesets[tilesetIndex];
  const sx = (localIndex % ts.cols) * TILE_SIZE;
  const sy = Math.floor(localIndex / ts.cols) * TILE_SIZE;

  context.drawImage(
    images[tilesetIndex],
    sx, sy, TILE_SIZE, TILE_SIZE,
    x, y, TILE_SIZE, TILE_SIZE
  );
}

function drawFullMapToCanvas() {
  mapCanvas.width = MAP_WIDTH * TILE_SIZE;
  mapCanvas.height = MAP_HEIGHT * TILE_SIZE;

  for (let y = 0; y < MAP_HEIGHT; y++) {
    for (let x = 0; x < MAP_WIDTH; x++) {
      const idx = y * MAP_WIDTH + x;
      const drawX = x * TILE_SIZE;
      const drawY = y * TILE_SIZE;

      if (baseMap[idx] != null) drawTile(baseMap[idx], drawX, drawY, mapCtx);
      if (topMap[idx] != null) drawTile(topMap[idx], drawX, drawY, mapCtx);
      if (overlayMap[idx] != null) drawTile(overlayMap[idx], drawX, drawY, mapCtx);
    }
  }
}

function drawPlayer(time) {
  const playerInImageWidth = playerImage.naturalWidth / 14;
  const playerInImageHeight = playerImage.naturalHeight / 4;

  let frames;
  if (player.state === 'attacking') {
    frames = player.frames['attack' + cap(player.direction)];
  } else if (player.moving || player.state === 'walking') {
    frames = player.frames[player.direction];
  } else {
    frames = player.frames['idle' + cap(player.direction)];
  }

  const delay = (player.state === 'attacking')
    ? player.attackFrameDelay
    : (player.moving ? player.frameDelay : player.frameDelay * 3);

  if ((player.moving || player.state === 'attacking' || player.state === 'idle') 
      && time - player.lastFrameTime > delay) {
    player.lastFrameTime = time;

    if (player.state === 'attacking') {
      player.frameIndex++;
      if (player.frameIndex >= frames.length) {
        player.frameIndex = 0;
        if (keys['w'] || keys['a'] || keys['s'] || keys['d']) {
          player.state = 'walking';
          updateDirection();
        } else {
          player.state = 'idle';
        }
      }
    } else {
      player.frameIndex = (player.frameIndex + 1) % frames.length;
    }
  }

  const tileIndex = frames[player.frameIndex];
  const sx = (tileIndex % 14) * playerInImageWidth;
  const sy = Math.floor(tileIndex / 14) * playerInImageHeight;

  ctx.drawImage(
    playerImage,
    sx, sy, playerInImageWidth, playerInImageHeight,
    canvas.width / 2 - playerInImageWidth / 2,
    canvas.height / 2 - playerInImageHeight / 2,
    playerInImageWidth, playerInImageHeight
  );
}

function cap(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function drawScene(time) {
  let offsetX = player.x - canvas.width / 2 + TILE_SIZE / 2;
  let offsetY = player.y - canvas.height / 2 + TILE_SIZE / 2;

  offsetX = Math.max(0, Math.min(offsetX, MAP_WIDTH * TILE_SIZE - canvas.width));
  offsetY = Math.max(0, Math.min(offsetY, MAP_HEIGHT * TILE_SIZE - canvas.height));

  ctx.drawImage(
    mapCanvas,
    offsetX, offsetY, canvas.width, canvas.height,
    0, 0, canvas.width, canvas.height
  );

  drawPlayer(time);

  for (let y = 0; y < MAP_HEIGHT; y++) {
    for (let x = 0; x < MAP_WIDTH; x++) {
      const idx = y * MAP_WIDTH + x;
      const tile = topMap[idx];
      if (tile != null) {
        const drawX = x * TILE_SIZE - offsetX;
        const drawY = y * TILE_SIZE - offsetY;
        if (
          drawX + TILE_SIZE < 0 || drawX > canvas.width ||
          drawY + TILE_SIZE < 0 || drawY > canvas.height
        ) continue;
        drawTile(tile, drawX, drawY, ctx);
      }
    }
  }
}

function updatePlayerPosition() {
  const nextX = player.x + player.vx;
  const nextY = player.y + player.vy;

  const corners = [
    { x: nextX, y: nextY },
    { x: nextX + TILE_SIZE - 1, y: nextY },
    { x: nextX, y: nextY + TILE_SIZE - 1 },
    { x: nextX + TILE_SIZE - 1, y: nextY + TILE_SIZE - 1 }
  ];

  let isBlocked = false;

  for (const corner of corners) {
    const tileX = Math.floor(corner.x / TILE_SIZE);
    const tileY = Math.floor(corner.y / TILE_SIZE);

    if (tileX < 0 || tileX >= MAP_WIDTH || tileY < 0 || tileY >= MAP_HEIGHT) {
      isBlocked = true;
      break;
    }

    const tileIndex = tileY * MAP_WIDTH + tileX;

    const b = baseMap[tileIndex];
    const t = topMap[tileIndex];
    const o = overlayMap[tileIndex];

    if (
      collidableTiles.includes(b) ||
      collidableTiles.includes(t) ||
      collidableTiles.includes(o)
    ) {
      isBlocked = true;
      break;
    }
  }

  if (!isBlocked) {
    player.x = nextX;
    player.y = nextY;
  } 
}

function gameLoop(time) {
  ctx.fillStyle = '#9bd4c3';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  updatePlayerPosition();
  drawScene(time);
  requestAnimationFrame(gameLoop);
}

const keys = {};
let lastKey = '';

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && !player.isAttackingKey) {
    player.isAttackingKey = true;
    if (player.state !== 'attacking') {
      player.state = 'attacking';
      player.frameIndex = 0;
      player.lastFrameTime = performance.now();
      player.vx = 0;
      player.vy = 0;
      player.moving = false;
    }
    return;
  }

  keys[e.key] = true;
  lastKey = e.key;
  updateDirection();
});

document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
  if (e.key === ' ') {
    player.isAttackingKey = false;
  }
  updateDirection();
});

function updateDirection() {
  if (player.state === 'attacking' && player.frameIndex < player.frames['attack' + cap(player.direction)].length) {
    return;
  }

  const wasMoving = player.moving;
  player.vx = 0;
  player.vy = 0;
  player.moving = false;

  if (keys['w'] && lastKey === 'w') {
    player.vy = -player.speed;
    player.direction = 'up';
    player.moving = true;
  }
  if (keys['s'] && lastKey === 's') {
    player.vy = player.speed;
    player.direction = 'down';
    player.moving = true;
  }
  if (keys['a'] && lastKey === 'a') {
    player.vx = -player.speed;
    player.direction = 'left';
    player.moving = true;
  }
  if (keys['d'] && lastKey === 'd') {
    player.vx = player.speed;
    player.direction = 'right';
    player.moving = true;
  }

  if (player.moving && !wasMoving) {
    player.lastFrameTime = performance.now();
    player.state = 'walking';
  } else if (!player.moving && player.state !== 'attacking') {
    player.state = 'idle';
  }
}
</script>
</body>
</html>
